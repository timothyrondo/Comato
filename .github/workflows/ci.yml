name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit + coverage gate (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      # Per-app install: packages/shared is a tsconfig-path alias (no package.json),
      # so each app carries its own bun.lock + node_modules.
      - name: agent — install + test (coverage gate in bunfig)
        run: cd apps/agent && bun install && bun test
      - name: server — install + test + x402 integration
        run: cd apps/server && bun install && bun test
      - name: web — install + test
        run: cd apps/web && bun install && bun test
      - name: typecheck (agent + server + web build)
        run: |
          (cd apps/agent && bun run typecheck)
          (cd apps/server && bun run typecheck)
          (cd apps/web && bun run build)

  contracts:
    name: Contracts (forge test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: forge test
        run: cd packages/contracts && forge test -vvv

  e2e:
    name: E2E — anvil Celo fork (Track 1 full flow)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: foundry-rs/foundry-toolchain@v1
      - name: install agent + e2e deps
        run: |
          (cd apps/agent && bun install)
          (cd e2e && bun install)
      - name: e2e (fork forno, deploy, breach→rescue)
        run: bun run e2e
        env:
          CELO_FORK_URL: https://forno.celo.org
